    - { name: "max", label: "Cantidad", default: "10" }
    - { name: "categoria", label: "Categoria", options: ["Autopista", "Avenida", "Boulevard", "Calle", "Pasillo", "Pasaje", "Peatonal", "Ruta"] }
    - { name: "campos", label: "Campos", default: "completo", options: ["basico", "estandar", "completo"], visible: false }
    - { name: "geometria", label: "Geometría", default: "lineas", options: [ "lineas" ], visible: false }

direcciones:
  title: "Direcciones"
  url_path: "/direcciones"
  params:
    - { name: "provincia", label: "Provincia", options: "provincias" }
    - { name: "departamento", label: "Departamento", options: "departamentos", dependency: ["provincia"] }
    - { name: "localidad_censal", label: "Localidad censal", options: "localidades-censales", dependency: [ "departamento" ] }
    - { name: "localidad", label: "Localidad", options: "localidades", dependency: [ "departamento" ] }
    - { name: "direccion", label: "Direccion", default: "" }
    - { name: "max", label: "Cantidad máxima", default: "10" }
    - { name: "desplazar", label: "Desplazar a la manzana", default: false }
    - { name: "geometria", label: "geometria", default: "puntos", options: [ "puntos" ], visible: false }
    - { name: "aplanar", label: "aplanar", default: true, visible: false }
    - { name: "campos", label: "Campos", default: "completo", options: ["basico", "estandar", "completo"], visible: false }

ubicacion:
  title: "Ubicación"
  url_path: "/ubicacion"
  full_download: false
  reverse_georef: true
  tmp_layer: false
  params:
    - { name: "lat", label: "Latitud" }
    - { name: "lon", label: "Longitud" }
    - { name: "campos", label: "Campos", default: "completo", options: ["basico", "estandar", "completo"], visible: false }
  fields:
    - { name: "calle", label: "Calle" }

establecimientos:
  title: "Establecimientos"
  url_path: "/establecimientos"
  params:
    - { name: "tipo", label: "Tipo", options: ["educativos", "universitarios"] }
    - { name: "provincia", label: "Provincia", options: "provincias" }
    - { name: "departamento", label: "Departamento", options: "departamentos", dependency: ["provincia"] }
    - { name: "nombre", label: "Nombre" }
    - { name: "gestion", label: "Tipo de gestion", default: "estatal", options: ["estatal", "privado"] }
    - { name: "dependencia", label: "Dependencia"}
    - { name: "id", label: "ID" }
    - { name: "max", label: "Cantidad", default: "10" }
    - { name: "campos", label: "Campos", default: "completo", options: ["basico", "estandar", "completo"], visible: false }
    - { name: "geometria", label: "Geometria", default: "puntos", options: [ "puntos" ], visible: false }

establecimientos-cercanos:
  title: "Establecimientos cercanos"
  url_path: "/establecimientos-cercanos"
  full_download: false
  reverse_georef: true
  tmp_layer: false
  params:
    - { name: "lat", label: "Latitud", default: "" }
    - { name: "lon", label: "Longitud", default: "" }
    - { name: "radio", label: "Radio [km]", default: "10" }
    - { name: "tipo", label: "Tipo de establecimientos", options: [ "educativos", "universitarios" ] }
    - { name: "campos", label: "Campos", default: "completo", options: ["basico", "estandar", "completo"], visible: false }