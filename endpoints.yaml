provincias:
  title: "Provincias"
  url_path: "/provincias"
  params:
    - { name: "id", label: "ID" }
    - { name: "nombre", label: "Nombre" }
    - { name: "max", label: "Cantidad máxima", default: "24" }
    - { name: "geometria", label: "Geometría", default: "poligonos", options: [ "puntos", "poligonos" ] }
    - { name: "campos", label: "Campos", default: "completo", options: [ "basico", "estandar", "completo" ], visible: false }

departamentos:
  title: "Departamentos"
  url_path: "/departamentos"
  params:
    - { name: "provincia", label: "Provincia", options: "provincias" }
